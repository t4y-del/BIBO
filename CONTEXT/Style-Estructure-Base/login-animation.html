<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --space: #020817;
            --deep: #050d1f;
            --orange: #ff5c1a;
            --orange2: #ff8c42;
            --yellow: #ffe066;
            --glow: #ff7a3d;
            --white: #f0f4ff;
            --dim: #7a8aaa;
            --panel: rgba(10, 20, 50, 0.85);
        }

        body {
            background: var(--space);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            color: var(--white);
        }

        /* ── STARS ── */
        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(1px 1px at 10% 15%, #fff 0%, transparent 100%),
                radial-gradient(1px 1px at 25% 60%, #cce 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 40% 30%, #fff 0%, transparent 100%),
                radial-gradient(1px 1px at 55% 80%, #adf 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 10%, #fff 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 80% 50%, #fff 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 25%, #cce 0%, transparent 100%),
                radial-gradient(1px 1px at 5% 90%, #fff 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 45%, #fff 0%, transparent 100%),
                radial-gradient(1px 1px at 33% 75%, #adf 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 88% 70%, #fff 0%, transparent 100%),
                radial-gradient(1px 1px at 15% 40%, #cce 0%, transparent 100%),
                radial-gradient(1px 1px at 48% 55%, #fff 0%, transparent 100%),
                radial-gradient(1px 1px at 72% 88%, #fff 0%, transparent 100%),
                radial-gradient(1px 1px at 22% 22%, #adf 0%, transparent 100%);
        }

        /* twinkling layer */
        .stars::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(1px 1px at 30% 20%, #fff 0%, transparent 100%),
                radial-gradient(1px 1px at 65% 35%, #fff 0%, transparent 100%),
                radial-gradient(1px 1px at 50% 70%, #cce 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 15%, #fff 0%, transparent 100%),
                radial-gradient(1px 1px at 12% 55%, #fff 0%, transparent 100%);
            animation: twinkle 3s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            from {
                opacity: 0.4;
            }

            to {
                opacity: 1;
            }
        }

        /* ── PLANET ── */
        .planet {
            position: fixed;
            bottom: -120px;
            left: -80px;
            width: 340px;
            height: 340px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #1a3a6e, #0a1a3a 60%, #050d1f);
            box-shadow: 0 0 60px 20px rgba(30, 80, 200, 0.18), inset -20px -20px 40px rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .planet::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 15%;
            width: 60%;
            height: 30%;
            border-radius: 50%;
            background: rgba(100, 160, 255, 0.07);
            filter: blur(8px);
        }

        /* ── CARD ── */
        .card {
            position: relative;
            z-index: 10;
            background: var(--panel);
            border: 1px solid rgba(255, 92, 26, 0.25);
            border-radius: 4px;
            padding: 48px 44px 44px;
            width: 380px;
            backdrop-filter: blur(18px);
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.04),
                0 30px 80px rgba(0, 0, 0, 0.6),
                0 0 40px rgba(255, 92, 26, 0.08);
        }

        /* corner accents */
        .card::before,
        .card::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-color: var(--orange);
            border-style: solid;
        }

        .card::before {
            top: -1px;
            left: -1px;
            border-width: 2px 0 0 2px;
        }

        .card::after {
            bottom: -1px;
            right: -1px;
            border-width: 0 2px 2px 0;
        }

        /* ── LOGO / HEADER ── */
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 36px;
            display: block;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 10px var(--glow));
        }

        .logo h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--white);
            text-transform: uppercase;
        }

        .logo p {
            font-size: 11px;
            color: var(--dim);
            letter-spacing: 3px;
            margin-top: 4px;
        }

        /* ── FORM ── */
        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--dim);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            padding: 12px 14px;
            color: var(--white);
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        input:focus {
            border-color: var(--orange);
            box-shadow: 0 0 12px rgba(255, 92, 26, 0.2);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        /* ── BUTTON ── */
        .btn {
            width: 100%;
            margin-top: 24px;
            padding: 14px;
            background: linear-gradient(135deg, var(--orange), var(--orange2));
            border: none;
            border-radius: 2px;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: box-shadow .2s, transform .1s;
        }

        .btn:hover {
            box-shadow: 0 0 24px rgba(255, 92, 26, 0.5);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left .4s;
        }

        .btn:hover::after {
            left: 150%;
        }

        .sub {
            text-align: center;
            margin-top: 18px;
            font-size: 11px;
            color: var(--dim);
            letter-spacing: 1px;
        }

        .sub a {
            color: var(--orange2);
            text-decoration: none;
        }

        /* ── STATUS BAR ── */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 28px;
            padding: 8px 12px;
            background: rgba(0, 255, 100, 0.05);
            border: 1px solid rgba(0, 255, 100, 0.15);
            border-radius: 2px;
            font-size: 10px;
            letter-spacing: 2px;
            color: #4dff88;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4dff88;
            animation: pulse-dot 1.4s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 4px #4dff88;
            }

            50% {
                opacity: .4;
                box-shadow: none;
            }
        }

        /* ══════════════════════════════════
     LAUNCH OVERLAY
  ══════════════════════════════════ */
        .launch-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            pointer-events: none;
            opacity: 0;
        }

        .launch-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        /* dark screen fade */
        .launch-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 100%, rgba(255, 100, 0, 0.12) 0%, var(--space) 70%);
            opacity: 0;
            transition: opacity .3s;
        }

        .launch-overlay.active::before {
            opacity: 1;
        }

        /* ── ROCKET SCENE ── */
        .scene {
            position: relative;
            width: 160px;
            height: 520px;
            margin-bottom: 0;
            transform: translateY(120px);
        }

        /* LAUNCH: rocket moves up */
        .launch-overlay.active .scene {
            animation: launch-rocket 2.2s cubic-bezier(.4, 0, .2, 1) 0.3s forwards;
        }

        @keyframes launch-rocket {
            0% {
                transform: translateY(120px) scale(1);
            }

            15% {
                transform: translateY(110px) scale(1) rotate(-1deg);
            }

            25% {
                transform: translateY(90px) scale(1) rotate(1deg);
            }

            40% {
                transform: translateY(40px) scale(1);
            }

            70% {
                transform: translateY(-200px) scale(0.85);
            }

            100% {
                transform: translateY(-900px) scale(0.4);
            }
        }

        /* ROCKET BODY */
        .rocket {
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* nose cone */
        .nose {
            width: 0;
            height: 0;
            border-left: 22px solid transparent;
            border-right: 22px solid transparent;
            border-bottom: 52px solid #e8eaf6;
            filter: drop-shadow(0 -4px 8px rgba(200, 220, 255, 0.4));
        }

        /* windows strip */
        .body {
            width: 44px;
            background: linear-gradient(180deg, #c5cae9, #9fa8da);
            border-radius: 2px;
            padding: 8px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            position: relative;
        }

        .window {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #82eefd, #0277bd);
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 8px rgba(130, 238, 253, 0.6);
        }

        /* stripes */
        .stripe {
            position: absolute;
            left: 0;
            right: 0;
            height: 6px;
            background: var(--orange);
        }

        .stripe.top {
            top: 0;
        }

        .stripe.bottom {
            bottom: 0;
        }

        /* bottom cylinder */
        .engine {
            width: 44px;
            height: 28px;
            background: linear-gradient(180deg, #78909c, #455a64);
            border-radius: 0 0 6px 6px;
        }

        /* FINS */
        .fins {
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
        }

        .fin {
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
        }

        .fin.left {
            left: 0;
            border-right: 22px solid #b71c1c;
            border-top: 0px solid transparent;
            border-bottom: 40px solid transparent;
        }

        .fin.right {
            right: 0;
            border-left: 22px solid #b71c1c;
            border-top: 0px solid transparent;
            border-bottom: 40px solid transparent;
        }

        /* ── EXHAUST FLAME ── */
        .flame-wrap {
            position: absolute;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
        }

        .launch-overlay.active .flame-wrap {
            animation: flame-on 2.5s ease forwards 0.2s;
        }

        @keyframes flame-on {
            0% {
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            85% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        .flame {
            border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
            animation: flicker 80ms ease-in-out infinite alternate;
            transform-origin: top center;
            flex-shrink: 0;
        }

        .flame.f1 {
            width: 28px;
            height: 55px;
            background: linear-gradient(180deg, #fff7e0 0%, var(--yellow) 25%, var(--orange) 65%, transparent 100%);
            box-shadow: 0 0 20px 6px rgba(255, 150, 30, 0.5);
            z-index: 3;
            margin-bottom: -10px;
        }

        .flame.f2 {
            width: 42px;
            height: 75px;
            background: linear-gradient(180deg, var(--yellow) 0%, var(--orange) 45%, #c0392b 80%, transparent 100%);
            box-shadow: 0 0 30px 10px rgba(255, 80, 0, 0.35);
            z-index: 2;
            margin-bottom: -20px;
            animation-delay: 20ms;
        }

        .flame.f3 {
            width: 52px;
            height: 90px;
            background: linear-gradient(180deg, var(--orange) 0%, #c0392b 50%, rgba(100, 0, 0, 0.3) 85%, transparent 100%);
            box-shadow: 0 0 40px 15px rgba(200, 40, 0, 0.25);
            z-index: 1;
            animation-delay: 40ms;
        }

        @keyframes flicker {
            0% {
                transform: scaleX(1) scaleY(1);
            }

            25% {
                transform: scaleX(1.05) scaleY(0.96);
            }

            50% {
                transform: scaleX(0.93) scaleY(1.04);
            }

            75% {
                transform: scaleX(1.04) scaleY(0.97);
            }

            100% {
                transform: scaleX(0.97) scaleY(1.03);
            }
        }

        /* ── SMOKE PARTICLES ── */
        .smoke-container {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            pointer-events: none;
        }

        .smoke {
            position: absolute;
            left: 50%;
            bottom: 0;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(180, 180, 180, 0.4);
            transform: translateX(-50%);
            opacity: 0;
            filter: blur(6px);
        }

        .launch-overlay.active .smoke {
            animation: smoke-rise var(--dur) ease-out var(--delay) infinite;
        }

        @keyframes smoke-rise {
            0% {
                opacity: 0;
                transform: translateX(calc(-50% + var(--sx))) scale(0.5);
                bottom: 0;
            }

            20% {
                opacity: 0.6;
            }

            100% {
                opacity: 0;
                transform: translateX(calc(-50% + var(--sx) + var(--sx2))) scale(3);
                bottom: 80px;
            }
        }

        /* generate 12 smoke puffs via custom props */
        .smoke:nth-child(1) {
            --dur: 1.1s;
            --delay: 0.0s;
            --sx: -8px;
            --sx2: -18px;
            width: 24px;
            height: 24px;
        }

        .smoke:nth-child(2) {
            --dur: 1.3s;
            --delay: 0.1s;
            --sx: 10px;
            --sx2: 22px;
            width: 18px;
            height: 18px;
        }

        .smoke:nth-child(3) {
            --dur: 1.0s;
            --delay: 0.2s;
            --sx: -4px;
            --sx2: -10px;
            width: 20px;
            height: 20px;
        }

        .smoke:nth-child(4) {
            --dur: 1.4s;
            --delay: 0.05s;
            --sx: 6px;
            --sx2: 14px;
            width: 22px;
            height: 22px;
        }

        .smoke:nth-child(5) {
            --dur: 1.2s;
            --delay: 0.15s;
            --sx: -12px;
            --sx2: -24px;
            width: 16px;
            height: 16px;
        }

        .smoke:nth-child(6) {
            --dur: 0.9s;
            --delay: 0.3s;
            --sx: 14px;
            --sx2: 20px;
            width: 26px;
            height: 26px;
        }

        .smoke:nth-child(7) {
            --dur: 1.1s;
            --delay: 0.4s;
            --sx: -6px;
            --sx2: -16px;
            width: 20px;
            height: 20px;
        }

        .smoke:nth-child(8) {
            --dur: 1.3s;
            --delay: 0.0s;
            --sx: 8px;
            --sx2: 18px;
            width: 18px;
            height: 18px;
        }

        .smoke:nth-child(9) {
            --dur: 1.0s;
            --delay: 0.25s;
            --sx: -10px;
            --sx2: -20px;
            width: 22px;
            height: 22px;
        }

        .smoke:nth-child(10) {
            --dur: 1.5s;
            --delay: 0.1s;
            --sx: 2px;
            --sx2: 8px;
            width: 24px;
            height: 24px;
        }

        .smoke:nth-child(11) {
            --dur: 1.2s;
            --delay: 0.35s;
            --sx: -16px;
            --sx2: -28px;
            width: 14px;
            height: 14px;
        }

        .smoke:nth-child(12) {
            --dur: 1.0s;
            --delay: 0.2s;
            --sx: 18px;
            --sx2: 28px;
            width: 16px;
            height: 16px;
        }

        /* ── GROUND GLOW ── */
        .ground-glow {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(ellipse, rgba(255, 140, 30, 0.7) 0%, transparent 70%);
            opacity: 0;
            pointer-events: none;
        }

        .launch-overlay.active .ground-glow {
            animation: glow-expand 2.5s ease-out 0.2s forwards;
        }

        @keyframes glow-expand {
            0% {
                width: 0;
                height: 0;
                opacity: 0;
            }

            15% {
                width: 180px;
                height: 60px;
                opacity: 0.9;
            }

            60% {
                width: 240px;
                height: 80px;
                opacity: 0.5;
            }

            100% {
                width: 100px;
                height: 30px;
                opacity: 0;
            }
        }

        /* ── COUNTDOWN / HUD ── */
        .hud {
            position: fixed;
            top: 32px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 6px;
            color: var(--orange2);
            text-shadow: 0 0 20px var(--glow);
            opacity: 0;
            z-index: 200;
            white-space: nowrap;
        }

        .launch-overlay.active .hud {
            animation: hud-show 2.8s ease forwards 0.1s;
        }

        @keyframes hud-show {

            0%,
            5% {
                opacity: 0;
            }

            15% {
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        /* screen flash on ignition */
        .flash {
            position: fixed;
            inset: 0;
            z-index: 99;
            background: rgba(255, 180, 80, 0.22);
            opacity: 0;
            pointer-events: none;
        }

        .launch-overlay.active .flash {
            animation: flash-bang 0.35s ease-out 0.28s forwards;
        }

        @keyframes flash-bang {
            0% {
                opacity: 0.8;
            }

            100% {
                opacity: 0;
            }
        }

        /* ── SUCCESS SCREEN ── */
        .success {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: var(--space);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .6s;
        }

        .success.show {
            opacity: 1;
            pointer-events: all;
        }

        .success h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 6px;
            color: var(--white);
            text-align: center;
            animation: text-glow 2s ease-in-out infinite alternate;
        }

        .success p {
            margin-top: 12px;
            color: var(--dim);
            letter-spacing: 3px;
            font-size: 12px;
        }

        @keyframes text-glow {
            from {
                text-shadow: 0 0 20px rgba(255, 140, 60, 0.5);
            }

            to {
                text-shadow: 0 0 40px rgba(255, 140, 60, 0.9), 0 0 80px rgba(255, 80, 0, 0.4);
            }
        }

        .success-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: bounce-in .6s cubic-bezier(.17, .67, .3, 1.5) forwards;
            filter: drop-shadow(0 0 20px #ff8c42);
        }

        @keyframes bounce-in {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="stars"></div>
    <div class="planet"></div>

    <!-- LOGIN CARD -->
    <div class="card" id="loginCard">
        <div class="logo">
            <span class="logo-icon">🛸</span>
            <h1>Mission Control</h1>
            <p>DEEP SPACE OPERATIONS</p>
        </div>

        <div class="status-bar">
            <span class="dot"></span>
            ALL SYSTEMS NOMINAL
        </div>

        <div class="field">
            <label>Astronaut ID</label>
            <input type="text" id="user" placeholder="commander@nasa.gov" autocomplete="off">
        </div>
        <div class="field">
            <label>Access Code</label>
            <input type="password" id="pass" placeholder="••••••••••">
        </div>

        <button class="btn" id="launchBtn" onclick="startLaunch()">
            INICIAR MISIÓN ▶
        </button>

        <p class="sub">¿Sin credenciales? <a href="#">Solicitar acceso</a></p>
    </div>

    <!-- LAUNCH OVERLAY -->
    <div class="launch-overlay" id="overlay">
        <div class="flash"></div>
        <div class="hud" id="hudText">⚡ IGNICIÓN — DESPEGUE INICIADO</div>

        <div class="scene">
            <div class="ground-glow"></div>

            <div class="smoke-container">
                <div class="smoke"></div>
                <div class="smoke"></div>
                <div class="smoke"></div>
                <div class="smoke"></div>

        <p>ACCESO CONCEDIDO — MISIÓN EN CURSO</p>
    </div>

    <script>
        let launched = false;

        function startLaunch() {
            if (launched) return;
            launched = true;

            const card = document.getElementById('loginCard');
            const overlay = document.getElementById('overlay');
            const success = document.getElementById('success');
            const hud = document.getElementById('hudText');

            // Fade card out
            card.style.transition = 'opacity .3s, transform .3s';
            card.style.opacity = '0';
            card.style.transform = 'scale(0.97)';

            setTimeout(() => {
                card.style.display = 'none';

                // Activate overlay
                overlay.classList.add('active');

                // Countdown text cycling
                const msgs = [
                    '⚡ IGNICIÓN — DESPEGUE INICIADO',
                    '🔥 MOTORES AL 100%',
                    '🚀 DESPEGANDO...',
                    '🌌 RUMBO AL ESPACIO'
                ];
                let i = 0;
                const msgInterval = setInterval(() => {
                    i++;
                    if (i < msgs.length) hud.textContent = msgs[i];
                    else clearInterval(msgInterval);
                }, 550);

                // Show success after animation completes
                setTimeout(() => {
                    overlay.style.transition = 'opacity .5s';
                    overlay.style.opacity = '0';
                    success.classList.add('show');
                }, 2800);

            }, 300);
        }

        // Allow Enter key
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') startLaunch();
        });
    </script>
